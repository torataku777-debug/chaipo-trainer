<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFCネイバーズ (iPhone 15 Pro Max サイズ)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100vh;overflow:hidden;background:#1a1a1a;font-family:-apple-system,sans-serif;}
  body{display:flex;align-items:center;justify-content:center;}
  /* iPhone 15 Pro Max サイズ (430x932) で iframe 表示 */
  #app-frame{
    width:430px;
    height:932px;
    border:none;
    background:#000;
    box-shadow:0 0 60px rgba(0,0,0,0.8), 0 0 120px rgba(0,255,255,0.05);
    border-radius:12px;
    transform-origin:center center;
  }
  /* 開発用 ラベル */
  #label{
    position:fixed;top:10px;left:10px;
    color:#666;font-size:11px;font-family:monospace;
    user-select:none;pointer-events:none;
  }
</style>
</head>
<body>
  <div id="label">📱 iPhone 15 Pro Max (430×932) — desktop_wrapper.html</div>
  <iframe id="app-frame" src="index.html"></iframe>
<script>
(function(){
  var frame = document.getElementById('app-frame');
  function updateScale(){
    var sx = (window.innerWidth - 40) / 430;
    var sy = (window.innerHeight - 40) / 932;
    var scale = Math.min(sx, sy, 1);
    frame.style.transform = 'scale(' + scale + ')';
  }
  window.addEventListener('resize', updateScale);
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', updateScale);
  } else {
    updateScale();
  }
})();
</script>
</body>
</html>
