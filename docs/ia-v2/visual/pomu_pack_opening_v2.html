<!DOCTYPE html>
<!--
  ファイル: pomu_pack_opening_v2.html
  改善日: 2026-05-14
  改善者: Codex / GPT
  バージョン: v2

  v1 からの変更点:
   - intro パックを大型化し、二重ゴールドグロー、金粒子、タイトル微光を追加
   - animating を多層フラッシュ、放射光線、リング波紋、放射パーティクルに刷新
   - 報酬カード5種(朝霧/夕焼け/星空/渋谷ナイト/桜並木)のSVG背景を精細化
   - SR報酬に二重金縁、虹色ハイライト、金粒子、バッジスパークルを追加
   - complete に紙吹雪、ミニパック、サムネ金グロー、強い再開封ボタン発光を追加
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>VISUAL: 開封演出 (v2)</title>
  <style>
    :root {
      /* ぽむタウン共通トークン */
      --sky-100:        #e6f4fb;
      --sky-200:        #c5e2f0;
      --cloud-white:    #ffffff;
      --cloud-soft:     #f6fbfd;
      --pomu-yellow:    #fbbf24;
      --pomu-orange:    #f59e0b;
      --leaf-green:     #65c466;
      --ink-900:        #1a1f2c;
      --ink-500:        #6b7280;
      --ink-300:        #d1d5db;
      --ready-glow:     #ffd24a;
      --ready-glow-soft: rgba(255, 210, 74, 0.35);

      /* 開封演出専用トークン */
      --opening-night-top:    #0b1632;
      --opening-night-mid:    #1a2d52;
      --opening-night-bottom: #2a4775;
      --opening-flash:        #fff8db;
      --opening-text:         #f6fbfd;
      --opening-text-soft:    rgba(246, 251, 253, 0.62);
      --opening-gold:         #ffd24a;
      --opening-gold-hot:     #fff0a6;
      --opening-cyan:         #8de8ff;
      --opening-gold-dust:    rgba(255, 226, 138, 0.92);
      --opening-cyan-dust:    rgba(141, 232, 255, 0.72);

      /* レアリティ別アクセント */
      --rarity-n:        #9ca3af;
      --rarity-n-soft:   rgba(156, 163, 175, 0.30);
      --rarity-r:        #60a5fa;
      --rarity-r-soft:   rgba(96, 165, 250, 0.34);
      --rarity-sr:       #fbbf24;
      --rarity-sr-soft:  rgba(255, 210, 74, 0.42);
      --rarity-sr-hot:   rgba(255, 240, 166, 0.88);
      --rarity-sr-rainbow: linear-gradient(90deg,
        rgba(255,255,255,0),
        rgba(255,255,255,0.72),
        rgba(141,232,255,0.48),
        rgba(255,210,74,0.62),
        rgba(255,255,255,0));

      --card-shadow: 0 4px 12px rgba(26, 31, 44, 0.06),
                     0 1px 3px rgba(26, 31, 44, 0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #ecf3f7;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Noto Sans JP", sans-serif;
      color: var(--ink-900);
      letter-spacing: 0.02em;
      -webkit-font-smoothing: antialiased;
    }

    .device {
      width: 393px;
      height: 852px;
      margin: 24px auto;
      background: linear-gradient(180deg, var(--opening-night-top) 0%, var(--opening-night-mid) 56%, var(--opening-night-bottom) 100%);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 60px rgba(11, 22, 50, 0.42),
                  0 4px 12px rgba(11, 22, 50, 0.22);
      isolation: isolate;
    }

    /* 背景の星粒(intro/reveal で見える、animatingで明るく) */
    .opening-stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
    .opening-gold-dust {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.72;
      mix-blend-mode: screen;
    }
    .opening-gold-dust circle {
      transform-box: fill-box;
      transform-origin: center;
      animation: dustTwinkle 3.4s ease-in-out infinite;
    }
    .opening-gold-dust circle:nth-child(2n) { animation-delay: -1.2s; }
    .opening-gold-dust circle:nth-child(3n) { animation-delay: -2.1s; }
    @keyframes dustTwinkle {
      0%, 100% { opacity: 0.32; transform: scale(0.78); }
      45%      { opacity: 1;    transform: scale(1.22); }
      70%      { opacity: 0.58; transform: scale(0.92); }
    }

    /* 中央からの放射光(reveal 時) */
    .opening-rays {
      position: absolute;
      top: 50%; left: 50%;
      width: 600px; height: 600px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.42s ease;
      z-index: 0;
    }
    .opening-rays g {
      transform-box: fill-box;
      transform-origin: center;
      animation: slowRaySpin 16s linear infinite;
    }
    @keyframes slowRaySpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .device[data-stage="reveal"] .opening-rays {
      opacity: 0.78;
    }
    .device[data-stage="reveal"][data-rarity="sr"] .opening-rays {
      opacity: 1;
    }

    /* ステータスバー */
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 13px;
      font-weight: 700;
      color: var(--opening-text);
      position: relative;
      z-index: 2;
    }

    /* ヘッダー(戻る + 進捗) */
    .opening-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 20px 12px;
      position: relative;
      z-index: 2;
    }
    .opening-back {
      min-height: 38px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.20), rgba(255,255,255,0.08));
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 999px;
      padding: 7px 14px 7px 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--opening-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(14px) saturate(1.25);
      -webkit-backdrop-filter: blur(14px) saturate(1.25);
      letter-spacing: 0.04em;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.22),
        0 6px 16px rgba(0,0,0,0.16);
      transition: transform 0.08s ease, background 0.16s ease, box-shadow 0.16s ease;
    }
    .opening-back svg {
      width: 14px;
      height: 14px;
      stroke-width: 2.8;
    }
    .opening-back:active {
      transform: translateY(1px) scale(0.98);
      background: rgba(255, 255, 255, 0.18);
      box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.18),
        0 3px 10px rgba(0,0,0,0.16);
    }

    .opening-progress {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.28);
      transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .progress-dot.is-done {
      background: linear-gradient(180deg, #fff8db 0%, var(--opening-gold) 100%);
      border-color: rgba(255, 246, 199, 0.96);
      box-shadow:
        0 0 8px rgba(255, 210, 74, 0.68),
        inset 0 1px 0 rgba(255,255,255,0.72);
    }
    .progress-dot.is-current {
      background: var(--pomu-yellow);
      border-color: var(--pomu-yellow);
      transform: scale(1.28);
      box-shadow:
        0 0 0 4px rgba(255, 210, 74, 0.16),
        0 0 14px rgba(255, 210, 74, 0.86),
        inset 0 1px 0 rgba(255,255,255,0.62);
      animation: progressCurrentPulse 1.4s ease-in-out infinite;
    }
    @keyframes progressCurrentPulse {
      0%, 100% { transform: scale(1.18); }
      50%      { transform: scale(1.38); }
    }
    /* intro/animating/complete では進捗を隠す */
    .device[data-stage="intro"] .opening-progress,
    .device[data-stage="animating"] .opening-progress,
    .device[data-stage="complete"] .opening-progress {
      display: none;
    }

    /* メインコンテンツエリア */
    .opening-main {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      z-index: 1;
    }

    /* === ステージ共通 === */
    .opening-stage {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      gap: 24px;
    }
    .device[data-stage="intro"]     .stage-intro,
    .device[data-stage="animating"] .stage-animating,
    .device[data-stage="reveal"]    .stage-reveal,
    .device[data-stage="complete"]  .stage-complete {
      display: flex;
    }

    /* タップヒント */
    .opening-hint {
      font-size: 13px;
      font-weight: 700;
      color: var(--opening-text-soft);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      animation: hintPulse 1.6s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 1; }
    }

    /* === STAGE 1: intro (パック表示) === */
    .stage-intro {
      gap: 20px;
      padding-bottom: 28px;
    }
    .stage-intro .opening-pack-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.22em;
      color: var(--pomu-yellow);
      text-shadow:
        0 0 8px rgba(255, 210, 74, 0.56),
        0 0 18px rgba(255, 210, 74, 0.28);
    }
    .stage-intro .opening-pack-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--opening-text);
      letter-spacing: 0.04em;
      text-shadow:
        0 2px 8px rgba(0,0,0,0.42),
        0 0 14px rgba(255, 210, 74, 0.22);
    }
    .opening-pack-wrap {
      width: 260px;
      height: 320px;
      position: relative;
      cursor: pointer;
      filter:
        drop-shadow(0 24px 44px rgba(0,0,0,0.50))
        drop-shadow(0 0 26px rgba(255, 210, 74, 0.42))
        drop-shadow(0 0 58px rgba(255, 210, 74, 0.22));
      z-index: 1;
    }
    .opening-pack-wrap::before,
    .opening-pack-wrap::after {
      content: "";
      position: absolute;
      inset: 28px 4px 12px;
      border-radius: 46%;
      pointer-events: none;
      z-index: -1;
    }
    .opening-pack-wrap::before {
      background:
        radial-gradient(circle at 50% 46%, rgba(255, 240, 166, 0.44), rgba(255, 210, 74, 0.16) 46%, rgba(255, 210, 74, 0) 72%);
      filter: blur(8px);
      animation: packAuraPulse 2.6s ease-in-out infinite;
    }
    .opening-pack-wrap::after {
      inset: 48px 18px 24px;
      border: 1px solid rgba(255, 240, 166, 0.32);
      box-shadow:
        0 0 28px rgba(255, 210, 74, 0.30),
        inset 0 0 28px rgba(255, 210, 74, 0.10);
      opacity: 0.58;
      transform: rotate(-4deg);
    }
    .opening-pack-wrap svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    @keyframes packBigSway {
      0%, 100% { transform: rotate(-2.4deg) translateY(0); }
      50%      { transform: rotate(2.4deg)  translateY(-6px); }
    }
    .stage-intro .opening-pack-wrap > svg > .pack-bundle-big {
      transform-box: fill-box;
      transform-origin: center bottom;
      animation: packBigSway 3.2s ease-in-out infinite;
    }
    @keyframes packAuraPulse {
      0%, 100% { opacity: 0.62; transform: scale(0.96); }
      50%      { opacity: 1;    transform: scale(1.05); }
    }
    .opening-pack-wrap:active {
      transform: scale(1.04);
      transition: transform 0.1s ease-out;
    }

    /* === STAGE 2: animating (開封演出) === */
    .stage-animating { gap: 0; }
    .opening-burst {
      width: 430px;
      height: 430px;
      position: relative;
    }
    @keyframes burstFlash {
      0%   { opacity: 0; transform: scale(0.22); filter: blur(10px); }
      18%  { opacity: 0.72; transform: scale(0.58); filter: blur(4px); }
      42%  { opacity: 1; transform: scale(1.08); filter: blur(0); }
      68%  { opacity: 0.95; transform: scale(1.22); }
      100% { opacity: 0.34; transform: scale(1.38); filter: blur(2px); }
    }
    @keyframes packBurstDispel {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.95) rotate(0deg); filter: brightness(1); }
      8%   { opacity: 1; transform: translate(calc(-50% - 7px), calc(-50% + 2px)) scale(0.96) rotate(-3deg); }
      16%  { opacity: 1; transform: translate(calc(-50% + 7px), calc(-50% - 3px)) scale(0.98) rotate(3deg); }
      28%  { opacity: 1; transform: translate(-50%, calc(-50% - 26px)) scale(1.04) rotate(-8deg); }
      48%  { opacity: 0.94; transform: translate(-50%, calc(-50% - 42px)) scale(0.86) rotate(14deg); filter: brightness(1.28); }
      72%  { opacity: 0.46; transform: translate(-50%, calc(-50% - 18px)) scale(0.48) rotate(33deg); filter: brightness(1.85) blur(1px); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.08) rotate(54deg); filter: brightness(2.4) blur(3px); }
    }
    .opening-burst-flash {
      position: absolute;
      inset: 16px;
      border-radius: 999px;
      background:
        radial-gradient(circle at center,
        rgba(255, 255, 255, 0.98) 0%,
        rgba(255, 248, 219, 0.95) 14%,
        rgba(255, 210, 74, 0.62) 30%,
        rgba(255, 210, 74, 0.18) 52%,
        rgba(141, 232, 255, 0.12) 64%,
        rgba(255, 210, 74, 0) 78%);
      animation: burstFlash 1.4s ease-out forwards;
      transform-origin: center;
      mix-blend-mode: screen;
    }
    .opening-burst-rays {
      position: absolute;
      inset: -22px;
      border-radius: 999px;
      background:
        repeating-conic-gradient(from -7deg,
          rgba(255, 226, 138, 0) 0deg,
          rgba(255, 226, 138, 0.78) 5deg,
          rgba(255, 226, 138, 0.18) 10deg,
          rgba(255, 226, 138, 0) 30deg);
      mask-image: radial-gradient(circle at center, transparent 0 16%, #000 17% 72%, transparent 74%);
      -webkit-mask-image: radial-gradient(circle at center, transparent 0 16%, #000 17% 72%, transparent 74%);
      opacity: 0;
      animation: burstRays 1.36s cubic-bezier(0.15,0.82,0.22,1) forwards;
      transform-origin: center;
      mix-blend-mode: screen;
    }
    .opening-burst-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 116px;
      height: 116px;
      border-radius: 999px;
      border: 2px solid rgba(255, 240, 166, 0.72);
      box-shadow:
        0 0 18px rgba(255, 210, 74, 0.54),
        inset 0 0 18px rgba(255, 210, 74, 0.24);
      transform: translate(-50%, -50%) scale(0.25);
      opacity: 0;
      animation: burstRing 1.22s ease-out forwards;
    }
    .opening-burst-ring.ring-2 {
      width: 82px;
      height: 82px;
      border-color: rgba(141, 232, 255, 0.48);
      box-shadow:
        0 0 20px rgba(141, 232, 255, 0.34),
        inset 0 0 18px rgba(255,255,255,0.14);
      animation-delay: 0.18s;
    }
    .burst-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }
    .burst-particles .particle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--s, 7px);
      height: var(--s, 7px);
      border-radius: 999px;
      background: var(--c, var(--opening-gold-dust));
      box-shadow: 0 0 12px var(--c, var(--opening-gold-dust));
      transform: translate(-50%, -50%) scale(0.2);
      opacity: 0;
      animation: particleFly 1.12s cubic-bezier(0.12,0.76,0.22,1) forwards;
      animation-delay: var(--d, 0.36s);
    }
    .burst-particles .particle.is-spark {
      border-radius: 2px;
      transform: translate(-50%, -50%) rotate(45deg) scale(0.2);
    }
    .opening-burst-pack {
      position: absolute;
      top: 50%; left: 50%;
      width: 260px; height: 320px;
      transform: translate(-50%, -50%);
      animation: packBurstDispel 1.2s ease-in forwards;
      z-index: 3;
      filter:
        drop-shadow(0 20px 42px rgba(0,0,0,0.48))
        drop-shadow(0 0 34px rgba(255, 210, 74, 0.38));
    }
    .opening-burst-pack svg { width: 100%; height: 100%; }
    .stage-animating .opening-hint { display: none; }
    @keyframes burstRays {
      0%   { opacity: 0; transform: scale(0.42) rotate(-18deg); }
      30%  { opacity: 0.92; transform: scale(0.86) rotate(4deg); }
      68%  { opacity: 0.78; transform: scale(1.10) rotate(18deg); }
      100% { opacity: 0.04; transform: scale(1.26) rotate(32deg); }
    }
    @keyframes burstRing {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.22); }
      22%  { opacity: 0.86; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(3.1); }
    }
    @keyframes particleFly {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.16); }
      14%  { opacity: 1; }
      72%  { opacity: 0.92; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.2); }
    }

    /* === STAGE 3: reveal (報酬カード) === */
    .stage-reveal { gap: 20px; }

    .reward-card-wrap {
      perspective: 1000px;
      position: relative;
    }
    .device[data-stage="reveal"][data-rarity="sr"] .reward-card-wrap::before {
      content: "";
      position: absolute;
      inset: -46px -52px;
      border-radius: 999px;
      background:
        radial-gradient(circle at center, rgba(255, 240, 166, 0.24), rgba(255, 210, 74, 0.13) 38%, rgba(255, 210, 74, 0) 70%);
      filter: blur(2px);
      animation: srHaloPulse 1.8s ease-in-out infinite;
      pointer-events: none;
    }
    .sr-particles,
    .reward-entry-sparkles {
      position: absolute;
      inset: -42px;
      pointer-events: none;
      z-index: 4;
      display: none;
    }
    .device[data-stage="reveal"][data-rarity="sr"] .sr-particles,
    .device[data-stage="reveal"][data-rarity="sr"] .reward-entry-sparkles {
      display: block;
    }
    .sr-particles span {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s, 5px);
      height: var(--s, 5px);
      border-radius: 999px;
      background: var(--opening-gold-hot);
      box-shadow:
        0 0 8px rgba(255, 210, 74, 0.88),
        0 0 18px rgba(255, 210, 74, 0.42);
      opacity: 0;
      animation: srParticlePulse 1.9s ease-in-out infinite;
      animation-delay: var(--d, 0s);
    }
    .reward-entry-sparkles span {
      position: absolute;
      width: var(--s, 13px);
      height: var(--s, 13px);
      left: var(--x);
      top: var(--y);
      opacity: 0;
      transform: scale(0.2) rotate(45deg);
      animation: entrySparkPop 0.72s cubic-bezier(0.12,0.78,0.24,1) forwards;
      animation-delay: var(--d, 0.08s);
    }
    .reward-entry-sparkles span::before,
    .reward-entry-sparkles span::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      background: var(--opening-gold-hot);
      box-shadow: 0 0 10px rgba(255, 210, 74, 0.9);
      border-radius: 999px;
    }
    .reward-entry-sparkles span::before {
      width: 100%;
      height: 22%;
      top: 39%;
    }
    .reward-entry-sparkles span::after {
      width: 22%;
      height: 100%;
      left: 39%;
    }
    .reward-card {
      width: 226px;
      height: 304px;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, #f6fbfd 0%, #ffffff 100%);
      transform-style: preserve-3d;
    }
    .reward-card::before,
    .reward-card::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
    }
    .reward-card::before {
      left: 14px;
      right: 14px;
      top: 0;
      height: 8px;
      border-radius: 0 0 999px 999px;
      background: var(--rarity-sr-rainbow);
      filter: blur(0.2px);
    }
    .reward-card::after {
      inset: 8px;
      border-radius: 12px;
      border: 1px solid rgba(255, 248, 219, 0.66);
      box-shadow: inset 0 0 16px rgba(255, 210, 74, 0.22);
    }
    @keyframes rewardEnter {
      0%   { opacity: 0; transform: translateY(60px) scale(0.78) rotate(-6deg); }
      55%  { opacity: 1; transform: translateY(-8px) scale(1.06) rotate(2deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    }
    .device[data-stage="reveal"] .reward-card {
      animation: rewardEnter 0.62s cubic-bezier(0.16, 0.84, 0.32, 1.05) forwards;
    }

    /* レアリティ別フレーム */
    .reward-card[data-rarity="n"] {
      box-shadow:
        0 0 0 2px #e5e7eb,
        0 0 0 6px rgba(229, 231, 235, 0.42),
        0 18px 36px rgba(0,0,0,0.42);
    }
    .reward-card[data-rarity="r"] {
      box-shadow:
        0 0 0 2px var(--rarity-r),
        0 0 0 6px var(--rarity-r-soft),
        0 0 28px var(--rarity-r-soft),
        0 18px 36px rgba(0,0,0,0.42);
    }
    .reward-card[data-rarity="sr"] {
      box-shadow:
        0 0 0 2px #fff3b0,
        0 0 0 5px var(--rarity-sr),
        0 0 0 9px rgba(255, 210, 74, 0.24),
        0 0 30px rgba(255, 210, 74, 0.56),
        0 0 68px rgba(255, 210, 74, 0.30),
        0 18px 36px rgba(0,0,0,0.42);
    }
    .reward-card[data-rarity="sr"]::before,
    .reward-card[data-rarity="sr"]::after {
      opacity: 1;
    }

    .reward-card-art {
      width: 100%;
      height: 100%;
      display: block;
    }
    .reward-card-art svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .reward-card-rarity-strip {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: #1a1f2c;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.62),
        0 2px 5px rgba(0,0,0,0.32);
      z-index: 3;
    }
    .reward-card[data-rarity="n"]  .reward-card-rarity-strip {
      background: linear-gradient(180deg, #ffffff 0%, #d1d5db 100%);
    }
    .reward-card[data-rarity="r"]  .reward-card-rarity-strip {
      background: linear-gradient(180deg, #bfdbfe 0%, #60a5fa 100%);
      color: #0c2c70;
    }
    .reward-card[data-rarity="sr"] .reward-card-rarity-strip {
      padding: 5px 12px;
      font-size: 11px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0) 50%),
        linear-gradient(180deg, var(--pomu-yellow) 0%, var(--pomu-orange) 100%);
      color: #4a2900;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.82),
        0 0 0 1px rgba(255, 247, 202, 0.66),
        0 4px 10px rgba(0,0,0,0.34),
        0 0 18px rgba(255, 210, 74, 0.62);
    }
    .reward-card[data-rarity="sr"] .reward-card-rarity-strip::after {
      content: "";
      position: absolute;
      top: 3px;
      right: 5px;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #fff8db;
      box-shadow: 0 0 8px #fff8db;
      animation: badgeSpark 1.15s ease-in-out infinite;
    }

    .reward-info {
      text-align: center;
      color: var(--opening-text);
    }
    .reward-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.42);
    }
    .reward-category {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--opening-text-soft);
      margin-top: 6px;
    }
    .reward-rarity-stars {
      display: flex;
      justify-content: center;
      gap: 3px;
      margin-top: 8px;
      font-size: 14px;
      color: var(--pomu-yellow);
      text-shadow: 0 0 6px var(--ready-glow-soft);
    }
    .reward-rarity-stars .star-dim {
      color: rgba(255,255,255,0.22);
      text-shadow: none;
    }
    @keyframes srHaloPulse {
      0%, 100% { opacity: 0.62; transform: scale(0.96); }
      50%      { opacity: 1;    transform: scale(1.04); }
    }
    @keyframes srParticlePulse {
      0%, 100% { opacity: 0.28; transform: translateY(0) scale(0.76); }
      45%      { opacity: 1; transform: translateY(-4px) scale(1.18); }
      72%      { opacity: 0.52; transform: translateY(2px) scale(0.9); }
    }
    @keyframes entrySparkPop {
      0%   { opacity: 0; transform: scale(0.16) rotate(30deg); }
      38%  { opacity: 1; transform: scale(1.15) rotate(45deg); }
      100% { opacity: 0; transform: scale(0.62) rotate(72deg); }
    }
    @keyframes badgeSpark {
      0%, 100% { opacity: 0.36; transform: scale(0.82); }
      50%      { opacity: 1; transform: scale(1.34); }
    }

    /* === STAGE 4: complete (完了画面) === */
    .stage-complete { gap: 18px; }
    .complete-title-wrap {
      position: relative;
      width: 100%;
      min-height: 74px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-top: 26px;
    }
    .complete-confetti {
      position: absolute;
      left: 50%;
      top: 0;
      width: 236px;
      height: 66px;
      transform: translateX(-50%);
      overflow: visible;
      pointer-events: none;
    }
    .complete-confetti rect,
    .complete-confetti path,
    .complete-confetti circle {
      transform-box: fill-box;
      transform-origin: center;
      animation: confettiFloat 2.8s ease-in-out infinite;
    }
    .complete-confetti *:nth-child(2n) { animation-delay: -0.8s; }
    .complete-confetti *:nth-child(3n) { animation-delay: -1.6s; }
    .complete-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--opening-text);
      text-align: center;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.42);
    }
    .complete-title .em {
      color: var(--pomu-yellow);
      font-size: 28px;
      position: relative;
      text-shadow:
        0 2px 8px rgba(0,0,0,0.34),
        0 0 14px rgba(255, 210, 74, 0.66),
        0 0 28px rgba(255, 210, 74, 0.30);
    }
    .complete-title .em::before,
    .complete-title .em::after {
      content: "";
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: #fff8db;
      box-shadow: 0 0 10px rgba(255, 210, 74, 0.92);
      animation: dustTwinkle 1.8s ease-in-out infinite;
    }
    .complete-title .em::before {
      left: -13px;
      top: 2px;
    }
    .complete-title .em::after {
      right: -12px;
      bottom: 8px;
      animation-delay: -0.7s;
    }
    .complete-sub {
      font-size: 13px;
      font-weight: 600;
      color: var(--opening-text-soft);
      text-align: center;
      letter-spacing: 0.06em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .complete-pack-mini {
      width: 30px;
      height: 34px;
      flex: 0 0 auto;
      filter:
        drop-shadow(0 4px 8px rgba(0,0,0,0.24))
        drop-shadow(0 0 8px rgba(255, 210, 74, 0.32));
    }
    .complete-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      width: 100%;
      max-width: 320px;
    }
    .complete-grid-cell {
      aspect-ratio: 3 / 4;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10),
        0 4px 12px rgba(0,0,0,0.42);
    }
    .complete-grid-cell::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.46);
      pointer-events: none;
      z-index: 1;
    }
    .complete-grid-cell[data-rarity="r"] {
      box-shadow:
        0 0 0 1.5px var(--rarity-r),
        0 0 12px rgba(96, 165, 250, 0.22),
        0 4px 12px rgba(0,0,0,0.42);
    }
    .complete-grid-cell[data-rarity="sr"] {
      box-shadow:
        0 0 0 1.5px #fff3b0,
        0 0 0 3px rgba(255, 210, 74, 0.48),
        0 0 18px rgba(255, 210, 74, 0.56),
        0 0 34px rgba(255, 210, 74, 0.20),
        0 4px 12px rgba(0,0,0,0.42);
    }
    .complete-grid-cell[data-rarity="sr"]::after {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      top: 0;
      height: 4px;
      border-radius: 0 0 999px 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,248,219,0.9), rgba(255,255,255,0));
      z-index: 2;
    }
    .complete-grid-cell svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .complete-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 320px;
    }
    .complete-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: transform 0.08s ease, filter 0.18s ease;
    }
    .complete-btn.primary {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.52) 0%, rgba(255,255,255,0.16) 28%, rgba(255,255,255,0) 38%),
        radial-gradient(circle at 28% 18%, #ffe38a 0%, rgba(255,227,138,0.5) 34%, rgba(255,227,138,0) 60%),
        linear-gradient(180deg, var(--pomu-yellow) 0%, #ffb11e 55%, var(--pomu-orange) 100%);
      color: #fff;
      box-shadow:
        0 5px 12px rgba(245, 158, 11, 0.46),
        0 0 0 2px rgba(255, 210, 74, 0.18),
        0 0 24px rgba(255, 210, 74, 0.46),
        0 0 44px rgba(255, 210, 74, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.78);
      text-shadow: 0 1px 0 rgba(146, 64, 14, 0.32);
      animation: primaryGlowBreath 2.2s ease-in-out infinite;
    }
    .complete-btn.primary:active { transform: translateY(1px); filter: brightness(0.96); }
    .complete-btn.secondary {
      background: rgba(255, 255, 255, 0.12);
      color: var(--opening-text);
      border: 1px solid rgba(255, 255, 255, 0.20);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .complete-btn.secondary:active { background: rgba(255, 255, 255, 0.20); }
    @keyframes confettiFloat {
      0%, 100% { transform: translateY(0) rotate(-2deg); opacity: 0.72; }
      50%      { transform: translateY(5px) rotate(7deg); opacity: 1; }
    }
    @keyframes primaryGlowBreath {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.06); }
    }

    /* === デモ用ステート切替バー(プロトタイプ専用) === */
    .demo-stage-controls {
      max-width: 560px;
      margin: 16px auto 60px;
      padding: 14px 18px;
      background: #fff;
      border: 1px dashed #ccc;
      border-radius: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #444;
      line-height: 1.5;
    }
    .demo-stage-controls strong { margin-right: 6px; }
    .demo-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #f6f6f6;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .demo-btn.active {
      background: var(--ink-900);
      color: #fff;
      border-color: var(--ink-900);
    }

    @media (max-width: 430px) {
      .device {
        margin: 0 auto;
      }
      .demo-stage-controls {
        margin: 16px 12px 48px;
      }
    }

  </style>
</head>
<body>

<div class="device" data-stage="intro" data-rarity="r" data-reveal-index="1" role="application" aria-label="ガチャ開封演出">

  <!-- 背景の星粒(opening専用) -->
  <svg class="opening-stars" viewBox="0 0 393 852" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice">

  <!-- 中央放射光(reveal) -->
  <svg class="opening-rays" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <radialGradient id="rayCenter" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%"   stop-color="#fff8db" stop-opacity="0.85"/>
        <stop offset="22%"  stop-color="#ffd24a" stop-opacity="0.45"/>

      <line x1="120" y1="480" x2="172" y2="428"/>
      <line x1="428" y1="480" x2="480" y2="428"/>
    </g>
  </svg>

  <!-- ステータスバー -->
  <div class="status-bar">
    <span>9:41</span>
    <span>📶 100%</span>
  </div>

  <!-- ヘッダー -->
  <div class="opening-header">
    <button class="opening-back" data-action="back">
      <svg viewBox="0 0 16 16" aria-hidden="true" fill="none">
        <path d="M10 3.5 5.5 8l4.5 4.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>戻る</span>
    </button>
    <div class="opening-progress" aria-label="開封進捗">
      <span class="progress-dot is-current" data-step="1"></span>
      <span class="progress-dot" data-step="2"></span>
      <span class="progress-dot" data-step="3"></span>
      <span class="progress-dot" data-step="4"></span>
      <span class="progress-dot" data-step="5"></span>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div class="opening-main">

    <!-- === STAGE 1: intro === -->
    <div class="opening-stage stage-intro">
      <div class="opening-pack-label">PINEAPPLE BACKGROUND PACK</div>
      <div class="opening-pack-name">パイナップル背景パック</div>
      <div class="opening-pack-wrap" data-action="open">
        <svg viewBox="0 0 226 286" xmlns="http://www.w3.org/2000/svg" aria-label="背景パック">
          <defs>
            <linearGradient id="openDeckBack" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#f7fdff"/>
              <stop offset="42%" stop-color="#c5e2f0"/>
              <stop offset="100%" stop-color="#75b8d5"/>
            </linearGradient>
            <pattern id="openPackCloud" width="48" height="36" patternUnits="userSpaceOnUse">
              <g fill="#ffffff" opacity="0.58">
                <ellipse cx="14" cy="18" rx="10.4" ry="4.4"/>
                <ellipse cx="24" cy="15"  rx="9.6"  ry="5.6"/>
                <ellipse cx="34" cy="19"  rx="11.2" ry="4.2"/>

            <filter id="openDeckShadow" x="-22%" y="-20%" width="150%" height="150%">
              <feDropShadow dx="1.4" dy="3.2" stdDeviation="2.5" flood-color="#0b1632" flood-opacity="0.46"/>
              <feDropShadow dx="0" dy="0" stdDeviation="2.6" flood-color="#ffd24a" flood-opacity="0.22"/>

          </defs>

          <g class="pack-bundle-big">
            <ellipse cx="96" cy="260" rx="64" ry="9" fill="#0b1632" opacity="0.42"/>

            <g opacity="0.62" transform="rotate(-13 95 158)">
              <rect x="36" y="84" width="112" height="156" rx="13" fill="url(#openDeckBack)" stroke="#4e94b4" stroke-width="2" filter="url(#openDeckShadow)"/>
              <rect x="36" y="84" width="112" height="156" rx="13" fill="url(#openPackCloud)" opacity="0.5"/>
            </g>
            <g opacity="0.72" transform="rotate(-6 97 158)">
              <rect x="42" y="78" width="112" height="156" rx="13" fill="url(#openDeckBack)" stroke="#4e94b4" stroke-width="2" filter="url(#openDeckShadow)"/>
              <rect x="42" y="78" width="112" height="156" rx="13" fill="url(#openPackCloud)" opacity="0.5"/>
            </g>
            <g opacity="0.72" transform="rotate(7 100 158)">
              <rect x="52" y="80" width="112" height="156" rx="13" fill="url(#openDeckBack)" stroke="#4e94b4" stroke-width="2" filter="url(#openDeckShadow)"/>
              <rect x="52" y="80" width="112" height="156" rx="13" fill="url(#openPackCloud)" opacity="0.5"/>

            <g opacity="0.58" transform="rotate(13 103 160)">
              <rect x="60" y="86" width="112" height="156" rx="13" fill="url(#openDeckBack)" stroke="#4e94b4" stroke-width="2" filter="url(#openDeckShadow)"/>
              <rect x="60" y="86" width="112" height="156" rx="13" fill="url(#openPackCloud)" opacity="0.46"/>
            </g>
            <!-- 前面のメインカード -->
            <g filter="url(#openDeckShadow)">
              <rect x="46" y="70" width="124" height="168" rx="17" fill="none" stroke="#fff0a6" stroke-width="3" opacity="0.38"/>
              <rect x="50" y="74" width="116" height="160" rx="14" fill="url(#openDeckBack)" stroke="#0b1632" stroke-width="2.4"/>
              <rect x="50" y="74" width="116" height="160" rx="14" fill="url(#openPackCloud)" opacity="0.62"/>
              <rect x="56" y="80" width="104" height="148" rx="11" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.76"/>
              <rect x="62" y="86" width="92" height="136" rx="8" fill="none" stroke="#0b1632" stroke-width="0.9" opacity="0.14"/>
              <path d="M58 82 C82 72 134 72 158 82" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round" opacity="0.84"/>
              <path d="M64 90 C88 84 130 84 152 90" stroke="#fff8db" stroke-width="1.6" stroke-linecap="round" opacity="0.72"/>
              <g transform="translate(0, 6)">
                <path d="M62 178 L88 142 L106 162 L128 132 L156 178 Z"
                      fill="#f8fcff" stroke="#0b1632" stroke-width="2.4" stroke-linejoin="round"/>
                <g fill="#ffffff" stroke="#0b1632" stroke-width="1.8" opacity="0.94">
                  <ellipse cx="124" cy="138" rx="13" ry="5.4"/>
                  <ellipse cx="136" cy="135" rx="8.6" ry="6.8"/>
                  <ellipse cx="146" cy="139" rx="10.8" ry="4.8"/>
                </g>
              </g>
            </g>
          </g>
        </svg>
      </div>
      <div class="opening-hint">タップして開封</div>
    </div>

    <!-- === STAGE 2: animating === -->
    <div class="opening-stage stage-animating">
      <div class="opening-burst">
        <div class="opening-burst-rays"></div>
        <div class="opening-burst-ring ring-1"></div>
        <div class="opening-burst-ring ring-2"></div>
        <div class="opening-burst-flash"></div>
        <div class="burst-particles" aria-hidden="true">
          <span class="particle" style="--x:-148px;--y:-118px;--s:7px;--d:0.32s;--c:var(--opening-gold-dust);"></span>
          <span class="particle is-spark" style="--x:-92px;--y:-176px;--s:8px;--d:0.38s;--c:var(--opening-cyan-dust);"></span>
          <span class="particle" style="--x:-16px;--y:-194px;--s:5px;--d:0.34s;--c:var(--opening-gold-hot);"></span>
          <span class="particle" style="--x:72px;--y:-172px;--s:6px;--d:0.42s;--c:var(--opening-gold-dust);"></span>

  function stars(n) {
    return Array.from({length: 3}, (_, i) =>
      i < n ? '<span>\u2605</span>' : '<span class="star-dim">\u2605</span>'
    ).join('');
  }

  function rarityStripLabel(r) {
    return { n: 'N', r: 'R', sr: 'SR' }[r] || 'N';
  }

  function setRevealIndex(idx) {
    const reward = rewards[idx - 1];
    if (!reward) return;
    device.dataset.revealIndex = String(idx);
    device.dataset.rarity = reward.rarity;

    document.getElementById('rewardArt').innerHTML = rewardArts[reward.name] || '';
    document.getElementById('rewardName').textContent = reward.name;
    document.getElementById('rewardCategory').textContent = reward.category;
    document.getElementById('rewardStars').innerHTML = stars(reward.stars);

    const strip = document.getElementById('rewardRarityStrip');
    strip.textContent = rarityStripLabel(reward.rarity);

    document.getElementById('rewardCard').dataset.rarity = reward.rarity;

    // 進捗ドット更新
    document.querySelectorAll('.progress-dot').forEach(dot => {
      const step = Number(dot.dataset.step);
      dot.classList.toggle('is-done', step < idx);
      dot.classList.toggle('is-current', step === idx);
    });

    // reveal アニメ再トリガー
    const card = document.getElementById('rewardCard');
    card.style.animation = 'none';
    void card.offsetWidth;
    card.style.animation = '';

    const sparkles = document.getElementById('rewardEntrySparkles');
    sparkles?.querySelectorAll('span').forEach(sparkle => {
      sparkle.style.animation = 'none';
      void sparkle.offsetWidth;
      sparkle.style.animation = '';
    });
  }

  function setStage(stage) {
    device.dataset.stage = stage;
    document.querySelectorAll('.demo-btn[data-set-stage]').forEach(b =>
      b.classList.toggle('active', b.dataset.setStage === stage)
    );
    if (stage === 'reveal') {
      const idx = Number(device.dataset.revealIndex) || 1;
      setRevealIndex(idx);
    }
  }

  // 初期化: reveal 用カード1
  setRevealIndex(1);

  // パックタップで開封開始
  document.querySelector('[data-action="open"]')?.addEventListener('click', () => {
    setStage('animating');
    setTimeout(() => {
      setStage('reveal');
      setRevealIndex(1);
    }, 1400);
  });

  // reveal でタップ → 次のカード or 完了
  document.querySelector('.stage-reveal')?.addEventListener('click', e => {
    if (e.target.closest('.opening-back, .demo-btn')) return;
    const idx = Number(device.dataset.revealIndex) || 1;
    if (idx < 5) {
      setRevealIndex(idx + 1);
    } else {
      setStage('complete');
    }
  });

  // 戻る
  document.querySelector('[data-action="back"]')?.addEventListener('click', () => {
    alert('[ガチャ画面に戻る]');
  });

  // 完了画面のアクション
  document.querySelector('[data-action="open-again"]')?.addEventListener('click', () => {
    setStage('intro');
    setRevealIndex(1);
  });
  document.querySelector('[data-action="back-to-gacha"]')?.addEventListener('click', () => {
    alert('[ガチャ画面に戻る]');
  });

  // === デモ用ステート切替 ===
  document.querySelectorAll('.demo-btn[data-set-stage]').forEach(btn => {
    btn.addEventListener('click', () => setStage(btn.dataset.setStage));
  });
  document.querySelectorAll('.demo-btn[data-set-rarity]').forEach(btn => {
    btn.addEventListener('click', () => {
      device.dataset.rarity = btn.dataset.setRarity;
      document.getElementById('rewardCard').dataset.rarity = btn.dataset.setRarity;
      document.getElementById('rewardRarityStrip').textContent = rarityStripLabel(btn.dataset.setRarity);
    });
  });
  document.querySelectorAll('.demo-btn[data-reveal-step]').forEach(btn => {
    btn.addEventListener('click', () => {
      setStage('reveal');
      setRevealIndex(Number(btn.dataset.revealStep));
    });
  });
</script>
